<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

<style>
  :root{
    --navy:#0b2a55;--navy-2:#123a6e;--blue:#1d6df0;--blue-deep:#0f4fc4;
    --sky:#38bdf8;--sky-soft:#e6f4ff;--ink:#0d1b2a;--ink-2:#41556b;--ink-3:#7d90a3;
    --line:#e3ebf3;--line-2:#eef3f9;--bg:#f4f8fc;--panel:#fff;--ok:#16a34a;--violet:#7c3aed;
    --radius:16px;--shadow:0 1px 2px rgba(11,42,85,.04),0 8px 24px rgba(11,42,85,.06);
    --shadow-lg:0 12px 40px rgba(11,42,85,.14);
    --font:"Pretendard Variable",Pretendard,-apple-system,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:var(--font);color:var(--ink);font-size:14px;-webkit-font-smoothing:antialiased;
    background:radial-gradient(1200px 600px at 100% -10%,#eaf4ff 0%,transparent 55%),radial-gradient(900px 500px at -10% 110%,#eef6ff 0%,transparent 50%),var(--bg);
    background-attachment:fixed;}
  .app{display:flex;min-height:100vh}

  .side{width:236px;flex:0 0 236px;background:linear-gradient(180deg,var(--navy),var(--navy-2));color:#fff;padding:22px 16px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;gap:5px}
  .brand{display:flex;align-items:center;gap:11px;padding:4px 8px 16px}
  .brand .logo{width:38px;height:38px;border-radius:11px;flex:0 0 38px;background:linear-gradient(135deg,var(--sky),var(--blue));display:grid;place-items:center;font-weight:800;font-size:17px;color:#fff;box-shadow:0 6px 16px rgba(56,189,248,.35)}
  .brand b{font-size:15px;font-weight:800;letter-spacing:-.02em;display:block;line-height:1.2}
  .brand small{color:#9bc0ef;font-size:11px;font-weight:600;letter-spacing:.04em}
  .nav-label{color:#7ea4d6;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:13px 10px 5px}
  .nav-btn{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:transparent;border:0;color:#cfe0f5;font-family:inherit;font-size:13.5px;font-weight:600;padding:10px 12px;border-radius:11px;cursor:pointer;transition:.16s}
  .nav-btn:hover{background:rgba(255,255,255,.07);color:#fff}
  .nav-btn.on{background:rgba(56,189,248,.18);color:#fff;box-shadow:inset 0 0 0 1px rgba(56,189,248,.4)}
  .nav-btn svg{width:18px;height:18px;flex:0 0 18px;opacity:.9}
  .side-foot{margin-top:auto;padding:12px 10px 2px;border-top:1px solid rgba(255,255,255,.1);font-size:11px;color:#8fb2dd;line-height:1.6}

  .main{flex:1;min-width:0;padding:26px 32px 60px;max-width:1180px}
  .head{display:flex;align-items:flex-end;justify-content:space-between;gap:18px;margin-bottom:22px;flex-wrap:wrap}
  .head h1{font-size:24px;font-weight:800;letter-spacing:-.03em;margin:0}
  .head p{margin:5px 0 0;color:var(--ink-2);font-size:13px}
  .kicker{color:var(--blue);font-size:11px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;margin-bottom:7px}

  .btn{font-family:inherit;font-weight:700;font-size:13px;border-radius:11px;border:0;cursor:pointer;padding:11px 18px;transition:.16s;display:inline-flex;align-items:center;gap:8px;line-height:1}
  .btn-primary{background:linear-gradient(135deg,var(--blue),var(--blue-deep));color:#fff;box-shadow:0 6px 18px rgba(29,109,240,.32)}
  .btn-primary:hover{transform:translateY(-1px);box-shadow:0 10px 24px rgba(29,109,240,.4)}
  .btn-primary:disabled{opacity:.55;cursor:not-allowed;transform:none}
  .btn-ghost{background:#fff;color:var(--blue);box-shadow:inset 0 0 0 1px var(--line)}
  .btn-ghost:hover{box-shadow:inset 0 0 0 1px var(--blue);background:var(--sky-soft)}
  .btn-sm{padding:7px 12px;font-size:12px;border-radius:9px}
  .link{background:none;border:0;color:var(--blue);font-family:inherit;font-weight:700;font-size:12.5px;cursor:pointer}
  .link.warn{color:#c0392b}

  .panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .pad{padding:20px}

  /* board */
  .board{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;align-items:start}
  .col{background:rgba(255,255,255,.6);border:1px solid var(--line);border-radius:var(--radius);padding:13px 12px;min-height:120px}
  .col.drag{outline:2px dashed var(--sky);outline-offset:2px;background:var(--sky-soft)}
  .col-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;padding:0 3px}
  .pill{font-size:12px;font-weight:800;display:flex;align-items:center;gap:7px}
  .dot{width:8px;height:8px;border-radius:50%}
  .count{background:#fff;color:var(--ink-3);font-size:11px;font-weight:700;border-radius:20px;padding:2px 8px;border:1px solid var(--line)}
  .card{background:#fff;border:1px solid var(--line);border-radius:13px;padding:13px;margin-bottom:10px;cursor:grab;box-shadow:0 1px 2px rgba(11,42,85,.05);transition:.14s;position:relative}
  .card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px);border-color:#cfe0f5}
  .card:active{cursor:grabbing}
  .ctype{font-size:10.5px;font-weight:800;padding:3px 8px;border-radius:7px;display:inline-block}
  .t-reels{background:#e7f6ff;color:#0284c7}
  .t-card{background:#e6edff;color:var(--blue-deep)}
  .t-youtube{background:#e0f2fe;color:#0e5e8a}
  .t-notion{background:#eef0f4;color:#475569}
  .t-threads{background:#e7e9f2;color:#3a3f5c}
  .card h4{margin:9px 0 5px;font-size:13.5px;font-weight:700;line-height:1.35}
  .card .meta{font-size:11px;color:var(--ink-3);display:flex;gap:8px;align-items:center}
  .card .snip{font-size:11.5px;color:var(--ink-2);margin-top:7px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .empty{color:var(--ink-3);font-size:12px;text-align:center;padding:18px 8px;line-height:1.6}

  /* forms */
  .field{margin-bottom:16px}
  .field label{display:block;font-size:12.5px;font-weight:700;margin-bottom:7px}
  .hint{font-weight:500;color:var(--ink-3);font-size:11.5px;margin-left:6px}
  input[type=text],textarea,select{width:100%;font-family:inherit;font-size:13.5px;color:var(--ink);border:1px solid var(--line);border-radius:11px;padding:11px 13px;background:#fff;transition:.15s;resize:vertical}
  textarea{min-height:90px;line-height:1.6}
  input:focus,textarea:focus,select:focus{outline:0;border-color:var(--blue);box-shadow:0 0 0 3px rgba(29,109,240,.12)}
  .pick{display:flex;gap:10px;flex-wrap:wrap}
  .pick .tp{flex:1;min-width:120px;border:1.5px solid var(--line);border-radius:13px;padding:14px 12px;cursor:pointer;background:#fff;transition:.15s;text-align:center}
  .pick .tp:hover{border-color:#bcd4f6}
  .pick .tp.on{border-color:var(--blue);background:var(--sky-soft);box-shadow:0 0 0 3px rgba(29,109,240,.1)}
  .pick .tp .ic{font-size:22px;margin-bottom:6px}
  .pick .tp b{font-size:13.5px;display:block}
  .pick .tp span{font-size:11px;color:var(--ink-3)}
  .seg{display:inline-flex;background:#eef3f9;border-radius:11px;padding:4px;gap:4px}
  .seg button{border:0;background:transparent;font-family:inherit;font-weight:700;font-size:12.5px;color:var(--ink-2);padding:8px 16px;border-radius:8px;cursor:pointer;transition:.14s}
  .seg button.on{background:#fff;color:var(--blue);box-shadow:0 1px 4px rgba(11,42,85,.08)}

  /* result sections */
  .sec{margin-bottom:14px;border:1px solid var(--line);border-radius:13px;overflow:hidden;background:#fff}
  .sec-h{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:linear-gradient(90deg,#f4f9ff,#fff);border-bottom:1px solid var(--line-2)}
  .stitle{font-size:12.5px;font-weight:800;color:var(--navy);display:flex;align-items:center;gap:8px}
  .num{background:var(--blue);color:#fff;width:20px;height:20px;border-radius:6px;display:grid;place-items:center;font-size:11px;font-weight:800}
  .sec-b{padding:13px 15px;font-size:13.5px;line-height:1.7}
  .sec-b ul{margin:0;padding-left:0;list-style:none}
  .sec-b li{padding:7px 0;border-bottom:1px dashed var(--line-2);display:flex;gap:10px;align-items:flex-start}
  .sec-b li:last-child{border:0}
  .ix{color:var(--sky);font-weight:800;flex:0 0 auto}
  .scene{border-left:3px solid var(--sky);padding:8px 0 8px 13px;margin-bottom:11px}
  .scene .slabel{font-size:11px;font-weight:800;color:var(--blue);margin-bottom:3px}
  .scene .stext{white-space:pre-wrap}
  .copy{background:#fff;border:1px solid var(--line);color:var(--ink-2);font-size:11px;font-weight:700;border-radius:8px;padding:5px 10px;cursor:pointer;transition:.14s;display:inline-flex;gap:5px}
  .copy:hover{border-color:var(--blue);color:var(--blue);background:var(--sky-soft)}
  .copy.done{color:var(--ok);border-color:var(--ok)}
  .box{white-space:pre-wrap;background:#fbfdff;border:1px dashed var(--line);border-radius:10px;padding:12px;font-size:13px;line-height:1.75}
  .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
  .tag{background:var(--sky-soft);color:var(--blue-deep);font-size:11.5px;font-weight:600;padding:4px 9px;border-radius:7px}
  .md{white-space:pre-wrap;font-size:13px;line-height:1.75}
  .concept-grid{display:grid;gap:8px}
  .concept-grid .ci{font-size:13px}
  .concept-grid .ci b{color:var(--navy)}

  .grid2{display:grid;grid-template-columns:1.05fr .95fr;gap:18px;align-items:start}
  .loading{display:inline-flex;gap:9px;align-items:center;color:var(--blue);font-weight:700;font-size:13px}
  .spin{width:16px;height:16px;border:2.5px solid rgba(29,109,240,.25);border-top-color:var(--blue);border-radius:50%;animation:sp .7s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .err{background:#fff4f4;border:1px solid #ffd5d5;color:#c0392b;padding:11px 14px;border-radius:11px;font-size:12.5px;font-weight:600}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--navy);color:#fff;padding:11px 20px;border-radius:11px;font-size:13px;font-weight:600;box-shadow:var(--shadow-lg);opacity:0;transition:.25s;z-index:60;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .chip{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;background:var(--sky-soft);color:var(--blue-deep)}
  .badge-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:6px}
  .switch{display:inline-flex;align-items:center;gap:9px;cursor:pointer;font-size:12.5px;font-weight:600}
  .track{width:38px;height:22px;border-radius:20px;background:#cdd9e6;position:relative;transition:.18s}
  .track::after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.18s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
  .switch.on .track{background:var(--blue)}
  .switch.on .track::after{transform:translateX(16px)}

  /* DNA */
  .dna-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px}
  .dna-card{border:1px solid var(--line);border-radius:13px;padding:14px 15px;background:#fff}
  .dna-card .dl{font-size:11px;font-weight:800;color:var(--ink-3);letter-spacing:.02em;margin-bottom:7px}
  .dna-card .dv{font-size:13px;line-height:1.6;color:var(--ink)}
  .dna-card textarea{min-height:70px;margin:0}
  .learn-bar{display:flex;align-items:center;justify-content:space-between;gap:14px;border:1px solid var(--line);border-radius:13px;padding:16px 18px;background:linear-gradient(90deg,#f0f7ff,#fff);margin-bottom:16px}
  .learn-bar .lc{font-size:11px;color:var(--ink-3);font-weight:700;letter-spacing:.04em;margin-bottom:4px}
  .learn-bar .ln{font-size:18px;font-weight:800}

  /* modal */
  .modal-bg{position:fixed;inset:0;background:rgba(11,42,85,.4);backdrop-filter:blur(3px);display:none;align-items:flex-start;justify-content:center;z-index:50;padding:40px 16px;overflow:auto}
  .modal-bg.show{display:flex}
  .modal{background:#fff;border-radius:18px;max-width:760px;width:100%;box-shadow:var(--shadow-lg);animation:pop .2s ease}
  @keyframes pop{from{transform:translateY(14px);opacity:0}to{transform:none;opacity:1}}
  .modal-h{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--line)}
  .modal-h h3{margin:0;font-size:16px;font-weight:800;letter-spacing:-.02em}
  .x{background:#f1f5fa;border:0;width:30px;height:30px;border-radius:9px;cursor:pointer;font-size:16px;color:var(--ink-2)}
  .x:hover{background:#e6edf5}
  .modal-b{padding:20px 22px;max-height:64vh;overflow:auto}
  .modal-f{padding:14px 22px;border-top:1px solid var(--line);display:flex;justify-content:space-between;gap:10px}

  .fade{animation:fade .4s ease both}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  @media (max-width:880px){
    .side{width:64px;flex:0 0 64px;padding:18px 8px}
    .brand b,.brand small,.nav-btn span,.nav-label,.side-foot{display:none}
    .nav-btn{justify-content:center}
    .main{padding:20px 16px 60px}
    .board{grid-template-columns:1fr 1fr}
    .grid2,.dna-grid{grid-template-columns:1fr}
  }
</style>

<div class="app">
  <aside class="side">
    <div class="brand"><div class="logo">PD</div><div><b>콘텐츠 PD</b><small>도행러 스튜디오</small></div></div>
    <div class="nav-label">메인</div>
    <button class="nav-btn on" data-view="board"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="18" rx="1.5"/><rect x="14" y="3" width="7" height="11" rx="1.5"/></svg><span>작업 보드</span></button>
    <button class="nav-btn" data-view="create"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg><span>새 콘텐츠</span></button>
    <div class="nav-label">분석</div>
    <button class="nav-btn" data-view="analysis"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg><span>콘텐츠 분석</span></button>
    <button class="nav-btn" data-view="report"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19V5M4 19h16M8 16V9M13 16V6M18 16v-4"/></svg><span>도행러 리포트</span></button>
    <div class="nav-label">자산</div>
    <button class="nav-btn" data-view="dna"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3a9 9 0 100 18 9 9 0 000-18zM12 3v18"/></svg><span>톤 프로필</span></button>
    <button class="nav-btn" data-view="archive"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7h16M4 12h16M4 17h10"/></svg><span>아카이브</span></button>
    <div class="nav-label">설정</div>
    <button class="nav-btn" data-view="settings"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3.2"/><path d="M12 3v2.5M12 18.5V21M3 12h2.5M18.5 12H21M5.6 5.6l1.8 1.8M16.6 16.6l1.8 1.8M18.4 5.6l-1.8 1.8M7.4 16.6l-1.8 1.8"/></svg><span>계정·상품</span></button>
    <div class="side-foot">분석할수록 톤 프로필이 정교해지고, 그 DNA가 모든 생성에 자동 반영됩니다.</div>
  </aside>
  <main class="main" id="main"></main>
</div>

<div class="modal-bg" id="modalBg"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>

<script>
/* ===================== 기본값 ===================== */
const DEFAULT_SETTINGS = {
  provider:"openrouter",
  openrouterKey:"",
  apiKey:"",
  account:"도행러",
  topic:"여행·워홀(호주 등)·해외살이로 도전하고, 각자의 삶을 가치있게 사는 법",
  audience:"20~40대 여행·워홀·해외살이·삶의 변화·도전에 관심 있는 사람, 수익화·퍼스널브랜딩 관심자",
  goal:"조회수 + 저장 + 댓글 + 전환 + 상품판매 연결",
  products:"워킹홀리데이 크리에이터 챌린지(3기 곧 오픈)\n호주 워홀 전자책 패키지\n뉴질랜드 전자책\n워홀 크리에이터 가이드북"
};
const DNA_FIELDS = [
  ["formality","격식 수준"],["emotion","감정 톤"],
  ["speaker","화자 포지션"],["rhythm","문장 리듬"],
  ["expressions","자주 쓰는 표현"],["hooks","후킹 패턴"],
  ["cta","CTA 패턴"],["keywords","자주 다루는 키워드"]
];
const DEFAULT_DNA = {
  count:0,
  formality:"반말 중심 + 친근한 존댓말 혼용, 대화하듯",
  emotion:"솔직하고 따뜻함, 공감 먼저 → 격려",
  speaker:"먼저 도전해본 여행러 친구이자 멘토",
  rhythm:"짧은 문장 + 잦은 줄바꿈, 대화체",
  expressions:"~잖아요?, ~거든요, 진짜, 막막하죠, 저도 그랬어요, 근데, 그러니까",
  hooks:"손실회피/불안/비교/호기심/공감 중 1개 이상, 낮은상태→높은결과, 감정 먼저, 상황·사건 먼저",
  cta:"저장·댓글 유도 질문, 작은 yes 먼저, 밝은 미래 상상화법, 상품 자연 연결",
  keywords:"여행, 워홀, 호주, 해외살이, 도전, 실행, 자기계발, 삶의 가치, 루틴, 수익화, 퍼스널브랜딩, 비자"
};

let STATE = { projects:[], settings:{...DEFAULT_SETTINGS}, dna:{...DEFAULT_DNA}, patterns:[] };
let CURRENT="board", DRAFT=null;

const COLS=[
  {key:"plan",name:"기획중",color:"#38bdf8"},
  {key:"shoot",name:"촬영대기",color:"#1d6df0"},
  {key:"edit",name:"편집중",color:"#7c3aed"},
  {key:"done",name:"발행완료",color:"#16a34a"}
];
const TYPE_META={
  reels:{label:"릴스",cls:"t-reels",ic:"🎬"},
  card:{label:"카드뉴스",cls:"t-card",ic:"🗂️"},
  youtube:{label:"유튜브",cls:"t-youtube",ic:"▶️"},
  threads:{label:"스레드",cls:"t-threads",ic:"🧵"},
  notion:{label:"노션",cls:"t-notion",ic:"📝"}
};

/* ===================== 저장 (localStorage - 어디서나 동작) ===================== */
function lsGet(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
function lsSet(k,v){ try{ localStorage.setItem(k,v); return true; }catch(e){ return false; } }
function storageOK(){ try{ localStorage.setItem("__t","1"); localStorage.removeItem("__t"); return true; }catch(e){ return false; } }
const LS_KEYS={settings:"cpd_settings",dna:"cpd_dna",patterns:"cpd_patterns",projects:"cpd_projects"};
async function loadAll(){
  try{const v=lsGet(LS_KEYS.settings); if(v)STATE.settings={...DEFAULT_SETTINGS,...JSON.parse(v)};}catch(e){}
  try{const v=lsGet(LS_KEYS.dna); if(v)STATE.dna={...DEFAULT_DNA,...JSON.parse(v)};}catch(e){}
  try{const v=lsGet(LS_KEYS.patterns); if(v)STATE.patterns=JSON.parse(v);}catch(e){}
  try{const v=lsGet(LS_KEYS.projects); if(v)STATE.projects=JSON.parse(v);}catch(e){}
  if(!STATE.settings.provider) STATE.settings.provider="openrouter";
}
async function save(key){

async function callOpenRouter(system,user,maxTokens,jsonMode){
  const key=(STATE.settings.openrouterKey||"").trim();
  if(!key) throw new Error("OpenRouter 무료 키가 없어요. 계정·상품 > AI 연결에서 무료 키를 받아 등록하세요.");

        headers:{"Content-Type":"application/json","Authorization":"Bearer "+key,"HTTP-Referer":"https://thedojourney.github.io/","X-Title":"Content PD"},
        body:JSON.stringify(body)});

    if(res.status===401){ throw new Error("키가 거부됐어요(401). openrouter.ai/keys 에서 키를 새로 발급해 통째로 붙여넣어 주세요."); }
    if(!res.ok){
      const t=await res.text().catch(()=>"");
      if(res.status===429){ lastErr=new Error("무료 한도 초과 — 잠시 후 다시 시도하세요(분당/일일 제한)."); }
      else { lastErr=new Error("모델 일시 불가("+res.status+")"); }
      continue;
    }
    let data; try{ data=await res.json(); }catch(e){ lastErr=new Error("응답 파싱 실패"); continue; }
    if(data&&data.error&&data.error.message){ lastErr=new Error("모델 오류: "+String(data.error.message).slice(0,90)); continue; }
    const m=(data&&data.choices&&data.choices[0]&&data.choices[0].message)||{};
    let txt=(m.content||"").trim();
    if(!txt&&m.reasoning) txt=String(m.reasoning).trim();
    if(txt) return txt;
    lastErr=new Error("빈 응답"); continue;
  }
  throw lastErr||new Error("생성 실패 — 잠시 후 다시 시도해주세요.");
}
function parseJSON(txt){
  let s=txt.trim().replace(/^```json\s*/i,"").replace(/^```\s*/,"").replace(/```\s*$/,"").trim();
  const a=s.indexOf("{"); if(a>=0) s=s.slice(a);
  try{ return JSON.parse(s); }catch(e){}
  const b=s.lastIndexOf("}"); if(b>0){ try{ return JSON.parse(s.slice(0,b+1)); }catch(e){} }
  let r=s; const lc=r.lastIndexOf(","); if(lc>0) r=r.slice(0,lc);
  if((r.match(/"/g)||[]).length%2!==0) r+='"';
  let ob=(r.match(/\[/g)||[]).length-(r.match(/\]/g)||[]).length; while(ob-->0) r+="]";
  let oc=(r.match(/{/g)||[]).length-(r.match(/}/g)||[]).length; while(oc-->0) r+="}";
  return JSON.parse(r);
}
function safeJSON(txt){ try{ return parseJSON(txt); }catch(e){ return {__raw:txt}; } }

let CB=0;
function renderResult(type,topic,d){
  const area=document.getElementById("resultArea");
  let h=`<div class="fade" style="margin-top:6px"><div class="head" style="margin-bottom:14px"><div>
    <div class="kicker">Result · ${TYPE_META[type].label}${DRAFT&&DRAFT.sub?" "+DRAFT.sub:""}</div>

    <button class="btn btn-ghost" onclick="saveDraftToBoard()">＋ 작업보드에 담기</button></div>`;

  if(d.__raw){ h+=secCopy("생성 결과 (원문)",d.__raw,`<div class="box">${esc(d.__raw)}</div>`); area.innerHTML=h+`</div>`; area.scrollIntoView({behavior:"smooth",block:"start"}); return; }
  if(type==="threads"){
    h+=conceptBlock(d.concept);
    h+=secCopy("첫 글 (후킹·검색 키워드)",d.hook||"",`<div class="box">${esc(d.hook||"")}</div>`,1);
    h+=secCopy("스레드 본문 (이어지는 글)",(d.posts||[]).map(p=>`[${p.label}] ${p.text}`).join("\n\n"),
        (d.posts||[]).map(p=>`<div class="scene"><div class="slabel">${esc(p.label)}</div><div class="stext">${esc(p.text)}</div></div>`).join(""),2);
    h+=secCopy("마무리 CTA",d.cta||"",`<div class="box">${esc(d.cta||"")}</div>`,3);
    h+=secCopy("🔎 SEO 포인트",(d.seo||[]).join("\n"),listBlock(d.seo||[]),4);
    h+=secCopy("키워드 태그",(d.tags||[]).join(" "),`<div class="tags">${(d.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join("")}</div>`,5);
  }else if(type==="youtube"){
    h+=conceptBlock(d.concept);
    h+=secCopy("제목 후보 5개",(d.titles||[]).join("\n"),listBlock(d.titles||[]),1);
    h+=secCopy("썸네일 카피",(d.thumbnail||[]).join("\n"),listBlock(d.thumbnail||[]),2);
    h+=secCopy("인트로 후킹",d.hook||"",`<div class="box">${esc(d.hook||"")}</div>`,3);
    h+=secCopy("영상 구성",(d.outline||[]).map(o=>`[${o.section}] ${o.summary}`).join("\n"),
        (d.outline||[]).map(o=>`<div class="scene"><div class="slabel">${esc(o.section)}</div><div class="stext">${esc(o.summary)}</div></div>`).join(""),4);
    h+=secCopy("대본",(d.script||[]).map(s=>`[${s.label}]\n${s.text}`).join("\n\n"),
        (d.script||[]).map(s=>`<div class="scene"><div class="slabel">${esc(s.label)}</div><div class="stext">${esc(s.text)}</div></div>`).join(""),5);
    if(d.retention)h+=secCopy("이탈방지 장치",(d.retention||[]).join("\n"),listBlock(d.retention||[]),6);
    h+=secCopy("마무리 CTA",d.cta||"",`<div class="box">${esc(d.cta||"")}</div>`,7);
    h+=secCopy("영상 설명란",d.description||"",`<div class="box">${esc(d.description||"")}</div>`,8);
    if(d.seo)h+=secCopy("🔎 SEO 포인트",(d.seo||[]).join("\n"),listBlock(d.seo||[]),9);
    if(d.tags)h+=secCopy("검색 태그",(d.tags||[]).join(", "),`<div class="tags">${(d.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join("")}</div>`,10);
  }else{
    h+=conceptBlock(d.concept);
    h+=secCopy("썸네일 제목 5개",(d.thumbnails||[]).join("\n"),listBlock(d.thumbnails||[]),1);
    h+=secCopy("초반 후킹 3개",(d.hooks||[]).join("\n"),listBlock(d.hooks||[]),2);
    h+=secCopy(type==="reels"?"릴스 대본 (장면별)":"카드뉴스 본문 (장별)",

        (d.body||[]).map(b=>`<div class="scene"><div class="slabel">${esc(b.label)}</div><div class="stext">${esc(b.text)}</div></div>`).join(""),3);

    const cap=capText+"\n\n"+(d.hashtags||[]).join(" ");

function conceptBlock(c){if(!c)return"";const viral=(c.viral||[]).map(v=>`<li><span class="ix">•</span><span>${esc(v)}</span></li>`).join("");
  return `<div class="sec"><div class="sec-h"><span class="stitle"><span class="num">★</span>컨셉</span></div>
    <div class="sec-b concept-grid"><div class="ci"><b>한 문장 요약</b> · ${esc(c.summary||"")}</div>
    <div class="ci"><b>타깃</b> · ${esc(c.target||"")}</div>
    <div class="ci"><b>바이럴 포인트</b><ul style="margin-top:5px">${viral}</ul></div></div></div>`;}
function plain(t,b){return `<div class="sec"><div class="sec-h"><span class="stitle">${t}</span></div><div class="sec-b">${esc(b)}</div></div>`;}
function secCopy(title,raw,bodyHTML,num){const id="cb"+(CB++);window["_raw_"+id]=raw;
  return `<div class="sec"><div class="sec-h"><span class="stitle">${num?`<span class="num">${num}</span>`:""}${title}</span>
    <button class="copy" id="${id}" onclick="doCopy('${id}')">📋 복사</button></div><div class="sec-b">${bodyHTML}</div></div>`;}
function listBlock(arr,plain){if(!arr.length)return `<div class="empty">없음</div>`;
  return `<ul>`+arr.map((x,i)=>`<li>${plain?"":`<span class="ix">${i+1}</span>`}<span>${esc(x)}</span></li>`).join("")+`</ul>`;}
function doCopy(id){navigator.clipboard.writeText(window["_raw_"+id]||"").then(()=>{const b=document.getElementById(id);b.classList.add("done");b.textContent="✓ 복사됨";setTimeout(()=>{b.classList.remove("done");b.textContent="📋 복사";},1500);}).catch(()=>toast("복사 실패"));}
async function saveDraftToBoard(){
  if(!DRAFT)return;const d=DRAFT.data;
  let snip=DRAFT.type==="notion"?(d.concept||""):((d.concept&&d.concept.summary)||(d.titles&&d.titles[0])||(d.thumbnails&&d.thumbnails[0])||"");
  STATE.projects.unshift({id:"p"+Date.now(),type:DRAFT.type,sub:DRAFT.sub,title:DRAFT.topic,status:"plan",
    date:new Date().toLocaleDateString("ko-KR",{year:"numeric",month:"2-digit",day:"2-digit"}),snippet:snip,data:d});
  await save("projects");toast("보드 '기획중'에 담았어요");go("board");
}

  if(d.__raw){body=secCopy("생성 결과(원문)",d.__raw,`<div class="box">${esc(d.__raw)}</div>`);}
  else if(p.type==="threads"){body=conceptBlock(d.concept)+secCopy("첫 글",d.hook||"",`<div class="box">${esc(d.hook||"")}</div>`)+secCopy("본문",(d.posts||[]).map(x=>`[${x.label}] ${x.text}`).join("\n\n"),(d.posts||[]).map(x=>`<div class="scene"><div class="slabel">${esc(x.label)}</div><div class="stext">${esc(x.text)}</div></div>`).join(""))+secCopy("태그",(d.tags||[]).join(" "),`<div class="tags">${(d.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join("")}</div>`);}
  else if(p.type==="notion"){body=plain("컨셉",d.concept||"")+secCopy("완성본",d.content||"",`<div class="md">${esc(d.content||"")}</div>`);}

      +secCopy("대본",(d.script||[]).map(s=>`[${s.label}]\n${s.text}`).join("\n\n"),(d.script||[]).map(s=>`<div class="scene"><div class="slabel">${esc(s.label)}</div><div class="stext">${esc(s.text)}</div></div>`).join(""))

      +secCopy("본문",(d.body||[]).map(b=>`[${b.label}] ${b.text}`).join("\n\n"),(d.body||[]).map(b=>`<div class="scene"><div class="slabel">${esc(b.label)}</div><div class="stext">${esc(b.text)}</div></div>`).join(""))
      +secCopy("캡션",(d.caption||"")+"\n\n"+(d.hashtags||[]).join(" "),`<div class="box">${esc(d.caption||"")}</div>`);

        <div class="field"><label>제목</label><input type="text" id="ed_title" value="${esc(p.title)}"></div>
        <div class="field"><label>메모 / 수정 내용 <span class="hint">대본을 다듬거나 메모를 적어두세요</span></label><textarea id="ed_memo" style="min-height:180px">${esc(p.memo||"")}</textarea></div>
        ${body}
      </div>
      <div class="modal-f"><button class="btn btn-primary btn-sm" onclick="saveCardEdit('${p.id}')">저장</button>
        <button class="btn btn-ghost btn-sm" onclick="openProject('${p.id}')">취소</button></div>`;
  }else{
    html=`<div class="modal-h"><h3>${tm.ic} ${esc(p.title)}</h3><button class="x" onclick="closeModal()">×</button></div>
      <div class="modal-b"><div class="badge-row" style="margin-bottom:14px"><span class="ctype ${tm.cls}">${tm.label}${p.sub?" · "+p.sub:""}</span><span style="font-size:12px;color:var(--ink-3)">${p.date}</span></div>
        <button class="btn btn-primary btn-sm" onclick="planFromCard('${p.id}')" style="margin-bottom:14px">✨ 이 주제로 전체 기획안 생성</button>
        ${p.memo?`<div class="sec"><div class="sec-h"><span class="stitle">📝 메모</span></div><div class="sec-b" style="white-space:pre-wrap">${esc(p.memo)}</div></div>`:""}
        ${body}</div>
      <div class="modal-f"><div style="display:flex;align-items:center;gap:9px"><span style="font-size:12px;color:var(--ink-2);font-weight:600">단계</span>
        <select id="stSel" style="width:auto" onchange="moveStatus('${p.id}',this.value)">${opts}</select></div>

  }
  document.getElementById("modal").innerHTML=html;
  document.getElementById("modalBg").classList.add("show");
}
function closeModal(){document.getElementById("modalBg").classList.remove("show");}
document.getElementById("modalBg").onclick=e=>{if(e.target.id==="modalBg")closeModal();};
async function moveStatus(id,st){const p=STATE.projects.find(x=>x.id===id);if(p){p.status=st;await save("projects");if(CURRENT==="board")renderBoard();}}
function planFromCard(id){
  const p=STATE.projects.find(x=>x.id===id);if(!p)return;

async function delProject(id){STATE.projects=STATE.projects.filter(x=>x.id!==id);await save("projects");closeModal();if(CURRENT==="board")renderBoard();toast("삭제됨");}
async function saveCardEdit(id){
  const p=STATE.projects.find(x=>x.id===id);if(!p)return;

  if(CURRENT==="board")renderBoard();

    account:"내 계정 링크(또는 최근 게시물·반응 수치)를 넣으면 잘 되는 콘텐츠·인사이트·부족한 점을 진단하고, 추천 콘텐츠를 보드에 자동으로 담아줍니다."

  document.querySelectorAll("#anaSeg button").forEach(b=>b.onclick=()=>{

    document.getElementById("anaDesc").textContent=descMap[ASEL]||descMap.mine;

async function fetchUrlText(url){
  try{
    const res=await fetch("https://r.jina.ai/"+url,{headers:{"Accept":"text/plain","X-Return-Format":"text"}});
    if(!res.ok) return null;
    const t=await res.text();
    return (t&&t.trim().length>40)? t.trim().slice(0,8000) : null;
  }catch(e){ return null; }
}
async function runAnalysis(){
  let input=val("anaInput");const msg=document.getElementById("anaMsg");
  if(!input){msg.innerHTML=`<div class="err">분석할 내용을 입력해주세요.</div>`;return;}
  const btn=document.getElementById("anaBtn");btn.disabled=true;
  const urlMatch=input.match(/https?:\/\/\S+/);
  document.getElementById("anaResult").innerHTML="";
  try{
    if(urlMatch){
      msg.innerHTML=`<div class="loading"><span class="spin"></span>링크 내용을 가져오는 중…</div>`;
      const fetched=await fetchUrlText(urlMatch[0]);
      const rest=input.replace(/https?:\/\/\S+/g,"").trim();
      if(fetched){ input=(rest?rest+"\n\n":"")+"[링크에서 가져온 내용]\n"+fetched; }
      else if(!rest){
        msg.innerHTML=`<div class="err">이 링크의 내용을 가져오지 못했어요. 인스타그램처럼 로그인이 필요한 페이지는 막힙니다. 게시물의 캡션·대본 텍스트를 복사해서 직접 붙여넣어 주세요.</div>`;
        btn.disabled=false;return;
      }
    }
    msg.innerHTML=`<div class="loading"><span class="spin"></span>분석 중…</div>`;
    if(ASEL==="mine")await analyzeMine(input,msg);
    else if(ASEL==="account")await analyzeAccount(input,msg);
    else await analyzeRef(input,msg);
  }catch(e){msg.innerHTML=`<div class="err">분석 실패: ${esc(e.message)}</div>`;}
  finally{btn.disabled=false;}
}
async function analyzeMine(input,msg){
  const system=`너는 ${STATE.settings.account}의 콘텐츠 PD다. 아래는 현재 톤 DNA와 크리에이터의 콘텐츠 샘플이다. 샘플을 분석해 기존 DNA를 더 정교하게 다듬어라(완전히 덮어쓰지 말고 보강·구체화).
[현재 DNA]
${DNA_FIELDS.map(([k,l])=>`· ${l}: ${STATE.dna[k]}`).join("\n")}
반드시 아래 JSON 하나만 출력(코드블록·설명 금지). 각 항목은 한국어로 간결하게:
{"formality":"","emotion":"","speaker":"","rhythm":"","expressions":"","hooks":"","cta":"","keywords":"","note":"이번 분석으로 새로 파악된 1줄 요약"}`;
  const out=await callClaude(system,"[콘텐츠 샘플]\n"+input,2500,true);
  let d; try{ d=parseJSON(out); }catch(e){ d=null; }
  if(!d){
    msg.innerHTML="";
    document.getElementById("anaResult").innerHTML=`<div class="sec fade" style="margin-top:18px"><div class="sec-h"><span class="stitle">분석 결과</span><button class="copy" onclick="copyText(this,window._mineOut)">📋 복사</button></div><div class="sec-b md">${esc(out)}</div></div>`;
    window._mineOut=out; toast("분석 완료(요약)"); return;
  }
  DNA_FIELDS.forEach(([k])=>{if(d[k])STATE.dna[k]=d[k];});
  STATE.dna.count=(STATE.dna.count||0)+1;
  await save("dna");
  msg.innerHTML="";
  document.getElementById("anaResult").innerHTML=`<div class="sec fade" style="margin-top:18px">

async function runReport(){
  const link=val("repLink");const msg=document.getElementById("repMsg");
  if(!link){msg.innerHTML=`<div class="err">내 계정 링크를 넣어주세요.</div>`;return;}
  const btn=document.getElementById("repBtn");btn.disabled=true;
  document.getElementById("repResult").innerHTML="";
  try{
    let content="",fetched=false;
    if(/^https?:\/\//.test(link)){
      msg.innerHTML=`<div class="loading"><span class="spin"></span>링크 분석 중…</div>`;
      const f=await fetchUrlText(link);
      if(f){ content=f; fetched=true; }
    }
    const payload = fetched ? ("[계정 링크] "+link+"\n[링크에서 가져온 공개 정보]\n"+content) : ("[계정 링크/아이디] "+link+"\n(링크에서 상세 데이터를 가져오지 못함 — 공개 정보와 계정 맥락으로 추정해 작성)");
    msg.innerHTML=`<div class="loading"><span class="spin"></span>리포트 작성 중…</div>`;
    await analyzeReport(payload,msg);
  }catch(e){msg.innerHTML=`<div class="err">리포트 실패: ${esc(e.message)}</div>`;}
  finally{btn.disabled=false;}
}
async function analyzeReport(input,msg){
  const system=`너는 ${STATE.settings.account}의 인스타그램 성장 전략가다. 아래 계정 정보로 '도행러 리포트'를 만든다. 한국어, 실무에 바로 쓰게 구체적으로. 어떤 경우에도 모든 항목을 비우지 말고 디테일하게 채운다. 공개되지 않아 알 수 없는 수치는 합리적으로 추정하고 값 뒤에 '(추정)'을 붙인다.
${contextBlock()}
퍼널 정의 - 유입(traffic): 신규 도달·탐색탭·검색 노출용 정보형, 저장·공유 잘 되는 콘텐츠 / 전환(conversion): 상품·신청 유도 콘텐츠 / 신뢰저장(trust): 깊이·전문성으로 신뢰 쌓고 저장 유발 / 브랜드(brand): 정체성·스토리·팬덤 콘텐츠.
반드시 아래 JSON 하나만 출력(코드블록·설명 금지):
{"overview":{"followers":"팔로워 수(없으면 추정)","engagement":"인게이지먼트 한 줄 진단","status":"좋음|보통|개선필요"},
"ranking":[{"title":"콘텐츠/주제","saves":"저장수 또는 (추정)","shares":"공유수 또는 (추정)","note":"왜 반응이 좋(을 것 같)은가"}],
"funnel":{"traffic":{"diag":"현재 진단","need":["지금 필요한 유입 콘텐츠 아이디어 1~2개"]},"conversion":{"diag":"","need":[]},"trust":{"diag":"","need":[]},"brand":{"diag":"","need":[]}},
"actions":["지금 당장 할 성장 액션 4~5개"],
"recommend":[{"format":"릴스|카드뉴스|유튜브|스레드 중 하나","title":"바로 만들 콘텐츠 제목","why":"퍼널상 지금 필요한 이유"}]}
ranking은 5개, 저장·공유 높은 순으로. recommend는 5개.`;
  const out=await callClaude(system,input,3800,true);
  let d; try{ d=parseJSON(out); }catch(e){ d=null; }
  msg.innerHTML="";
  const area=document.getElementById("repResult");
  if(!d){ area.innerHTML=`<div class="sec fade" style="margin-top:18px"><div class="sec-h"><span class="stitle">📊 성장 리포트</span><button class="copy" onclick="copyText(this,window._repOut)">📋 복사</button></div><div class="sec-b md">${esc(out)}</div></div>`; window._repOut=out; toast("리포트 완료"); return; }
  window._accRec=d.recommend||[];
  const ov=d.overview||{};
  const statusColor=ov.status==="좋음"?"var(--ok)":(ov.status==="개선필요"?"#c0392b":"var(--warn)");
  const rankRows=(d.ranking||[]).map((r,i)=>`<li><span class="ix">${i+1}</span><span><b>${esc(r.title)}</b> <span style="color:var(--ink-3)">· 저장 ${esc(r.saves)} · 공유 ${esc(r.shares)}</span><br><span style="color:var(--ink-3)">${esc(r.note)}</span></span></li>`).join("")||`<li>데이터 부족</li>`;
  const F=d.funnel||{};
  const fblock=(key,label,emoji)=>{const f=F[key]||{};const need=(f.need||[]).map(x=>`<li><span class="ix">•</span><span>${esc(x)}</span></li>`).join("");
    return `<div class="dna-card"><div class="dl">${emoji} ${label}</div><div class="dv">${esc(f.diag||"-")}</div>${need?`<ul style="margin-top:8px">${need}</ul>`:""}</div>`;};
  const acts=(d.actions||[]).map((x,i)=>`<li><span class="ix">${i+1}</span><span>${esc(x)}</span></li>`).join("");
  const recHtml=(d.recommend||[]).map((r,i)=>`<li><span class="ix">${i+1}</span><span><b>[${esc(r.format)}] ${esc(r.title)}</b><br><span style="color:var(--ink-3)">${esc(r.why)}</span></span></li>`).join("");
  area.innerHTML=`<div class="fade" style="margin-top:18px">
    <div class="sec"><div class="sec-h"><span class="stitle">📊 계정 현황</span><span class="chip" style="background:transparent;color:${statusColor};border:1px solid ${statusColor}">${esc(ov.status||"")}</span></div>
      <div class="sec-b"><b>팔로워</b> · ${esc(ov.followers||"-")}<br><b>인게이지먼트</b> · ${esc(ov.engagement||"-")}</div></div>
    <div class="sec"><div class="sec-h"><span class="stitle">🏆 반응 순위 (저장·공유 높은 순)</span></div><div class="sec-b"><ul>${rankRows}</ul></div></div>
    <div class="sec"><div class="sec-h"><span class="stitle">🧭 콘텐츠 퍼널 진단</span></div><div class="sec-b"><div class="dna-grid">
      ${fblock("traffic","유입 (도달·검색)","🌊")}${fblock("conversion","전환 (상품·신청)","💰")}${fblock("trust","신뢰·저장","🔖")}${fblock("brand","브랜드·팬덤","💎")}
    </div></div></div>
    <div class="sec"><div class="sec-h"><span class="stitle">🚀 지금 필요한 성장 액션</span></div><div class="sec-b"><ul>${acts}</ul></div></div>
    <div class="sec"><div class="sec-h"><span class="stitle">✅ 추천 콘텐츠 5개</span><button class="btn btn-primary btn-sm" onclick="autoPlanToBoard()">＋ 기획안으로 보드에 담기</button></div><div class="sec-b"><ul>${recHtml}</ul></div></div>
  </div>`;
  toast("성장 리포트 완료");
}

            ① <a href="https://openrouter.ai/keys" target="_blank" rel="noopener" style="color:var(--blue);font-weight:800">무료 키 받기 (openrouter.ai/keys) →</a> · 가입 후 "Create Key"<br>

        `:`
          <div style="font-size:12.5px;color:var(--ink-2);line-height:1.8;margin-bottom:12px">

async function saveSettings(){STATE.settings={...STATE.settings,account:val("s_account"),topic:val("s_topic"),audience:val("s_audience"),goal:val("s_goal"),products:val("s_products")};await save("settings");toast("저장됐어요");}
async function resetSettings(){const {apiKey,openrouterKey,provider}=STATE.settings;STATE.settings={...DEFAULT_SETTINGS,apiKey,openrouterKey,provider};await save("settings");renderSettings();toast("기본값으로 복원");}
async function setProvider(p){STATE.settings.provider=p;await save("settings");renderSettings();}
async function saveAIKey(){
  if((STATE.settings.provider||"openrouter")==="openrouter") STATE.settings.openrouterKey=val("s_orKey");
  else STATE.settings.apiKey=val("s_apiKey");
  await save("settings");toast("키 저장됨");
}
async function testConnection(){
  if((STATE.settings.provider||"openrouter")==="openrouter") STATE.settings.openrouterKey=val("s_orKey");
  else STATE.settings.apiKey=val("s_apiKey");
  await save("settings");
  const btn=document.getElementById("testBtn"),m=document.getElementById("testMsg");
  btn.disabled=true;m.style.color="var(--blue)";m.textContent="테스트 중…";
  try{ await callClaude("너는 한국어 비서다.","'연결됨'이라고 한국어로 답해.",256); m.style.color="var(--ok)";m.textContent="✓ 연결 성공! 이제 생성·분석이 됩니다."; }
  catch(e){ m.style.color="#c0392b";m.textContent="✗ "+e.message; }
  finally{ btn.disabled=false; }
}

function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function val(id){const e=document.getElementById(id);return e?e.value.trim():"";}
let TT;function toast(t){const e=document.getElementById("toast");e.textContent=t;e.classList.add("show");clearTimeout(TT);TT=setTimeout(()=>e.classList.remove("show"),2200);}
